<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>就活メモリー</title>
<style>
  :root {
    color-scheme: light;
    --bg: #f7f6f3;
    --card: #ffffff;
    --ink: #2b2a27;
    --sub: #8a877f;
    --line: #e6e3dc;
    --accent: #c96f4a;
    --accent-soft: #fbeee7;
    --green: #4a8c5c;
    --green-soft: #e9f3ec;
    --red: #c0504d;
    --red-soft: #f9ebea;
    --blue: #4a6e8c;
    --blue-soft: #eaf1f6;
    --gray-soft: #efeeea;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
    background: var(--bg); color: var(--ink); font-size: 14px; line-height: 1.6;
  }
  .wrap { max-width: 880px; margin: 0 auto; padding: 20px 16px 60px; }

  /* ===== header ===== */
  .top { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  h1 { font-size: 20px; font-weight: 700; }
  h1 span { color: var(--accent); }
  .top-actions { display: flex; gap: 8px; }

  button {
    font-family: inherit; font-size: 13px; cursor: pointer;
    border: 1px solid var(--line); background: var(--card); color: var(--ink);
    border-radius: 8px; padding: 7px 14px; transition: background .15s;
  }
  button:hover { background: var(--gray-soft); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  button.primary:hover { background: #b35e3b; }
  button.danger { color: var(--red); }
  button.small { padding: 3px 10px; font-size: 12px; border-radius: 6px; }

  /* ===== toolbar ===== */
  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
  #search {
    flex: 1; min-width: 200px; padding: 8px 12px; font-size: 14px; font-family: inherit;
    border: 1px solid var(--line); border-radius: 8px; background: var(--card);
  }
  #search:focus { outline: 2px solid var(--accent-soft); border-color: var(--accent); }
  .chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip {
    padding: 5px 12px; border-radius: 999px; border: 1px solid var(--line);
    background: var(--card); font-size: 12px; cursor: pointer;
  }
  .chip.on { background: var(--ink); color: #fff; border-color: var(--ink); }
  select {
    font-family: inherit; font-size: 13px; padding: 7px 10px;
    border: 1px solid var(--line); border-radius: 8px; background: var(--card); color: var(--ink);
  }

  /* ===== cards ===== */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    padding: 16px; cursor: pointer; transition: box-shadow .15s, transform .15s;
    display: flex; flex-direction: column; gap: 8px;
  }
  .card:hover { box-shadow: 0 4px 14px rgba(0,0,0,.07); transform: translateY(-1px); }
  .card-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .card-name { font-size: 16px; font-weight: 700; word-break: break-all; }
  .badge { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 999px; white-space: nowrap; }
  .stage-badge { background: #efeaf6; color: #6b5a8e; }
  .card-link { font-size: 12px; color: var(--blue); text-decoration: none; }
  .card-link:hover { text-decoration: underline; }
  .hp-row { display: flex; gap: 6px; align-items: center; }
  .hp-row input { flex: 1; }
  .stage-chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .stage-chip {
    padding: 6px 12px; border-radius: 999px; border: 1px solid var(--line);
    background: #fff; font-size: 12px; cursor: pointer;
  }
  .stage-chip.on { background: #6b5a8e; color: #fff; border-color: #6b5a8e; font-weight: 600; }
  .stage-chip.wait.on { background: var(--accent); border-color: var(--accent); }
  .b-draft { background: var(--gray-soft); color: var(--sub); }
  .b-done  { background: var(--blue-soft); color: var(--blue); }
  .b-pass  { background: var(--green-soft); color: var(--green); }
  .b-fail  { background: var(--red-soft); color: var(--red); }
  .card-meta { font-size: 12px; color: var(--sub); display: flex; gap: 10px; flex-wrap: wrap; }
  .due-warn { color: var(--red); font-weight: 700; }
  .due-soon { color: var(--accent); font-weight: 600; }
  .card-preview {
    font-size: 12px; color: var(--sub);
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .empty {
    grid-column: 1/-1; text-align: center; color: var(--sub); padding: 60px 20px;
    border: 2px dashed var(--line); border-radius: 12px;
  }

  /* ===== status themes ===== */
  .card { position: relative; overflow: hidden; }
  .card .deco { position: absolute; top: 8px; right: 10px; font-size: 18px; pointer-events: none; }
  .card .card-head { padding-right: 26px; }

  /* 通過 = 桜 */
  .card.s-pass, .panel.s-pass { background: linear-gradient(135deg, #fff8fa 0%, #ffe9f1 100%); border-color: #f3bed2; }
  .card.s-pass::before, .panel.s-pass::before {
    content: '🌸'; position: absolute; bottom: -8px; left: -8px; font-size: 38px;
    opacity: .16; transform: rotate(-18deg); pointer-events: none;
  }
  .card.s-pass .deco { animation: petal-sway 3.2s ease-in-out infinite; }
  @keyframes petal-sway {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-6px) rotate(16deg); }
  }

  /* 落選 = 悲しい雨 */
  .card.s-fail, .panel.s-fail { background: linear-gradient(180deg, #f5f5f8 0%, #eae8ef 100%); border-color: #d8d5e0; }
  .card.s-fail .card-name, .card.s-fail .card-preview, .card.s-fail .card-meta { color: #8f8c9a; }
  .card.s-fail::before, .panel.s-fail::before {
    content: '☔'; position: absolute; bottom: -6px; left: -6px; font-size: 34px;
    opacity: .12; pointer-events: none;
  }
  .card.s-fail .deco { animation: tear-drop 4s ease-in-out infinite; }
  @keyframes tear-drop {
    0%, 55%, 100% { transform: translateY(0); opacity: 1; }
    75% { transform: translateY(5px); opacity: .5; }
  }

  /* 提出済 = ドキドキ */
  .card.s-done, .panel.s-done { background: linear-gradient(135deg, #fffaf2 0%, #ffeddc 100%); border-color: #efc6a2; }
  .card.s-done, .panel.s-done { animation: doki-glow 1.5s ease-in-out infinite; }
  .card.s-done .deco { animation: heartbeat 1.5s ease-in-out infinite; transform-origin: center; }
  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    12% { transform: scale(1.3); }
    24% { transform: scale(1); }
    36% { transform: scale(1.2); }
    48% { transform: scale(1); }
  }
  @keyframes doki-glow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(201, 111, 74, .28); }
    50% { box-shadow: 0 0 0 6px rgba(201, 111, 74, .05); }
  }
  .panel.s-pass, .panel.s-fail, .panel.s-done { position: relative; overflow: hidden; }

  /* ===== detail ===== */
  .detail-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
  .saved-note { font-size: 12px; color: var(--sub); opacity: 0; transition: opacity .3s; }
  .saved-note.show { opacity: 1; }
  .panel { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 20px; margin-bottom: 14px; }
  .frow { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
  .frow:last-child { margin-bottom: 0; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field.grow { flex: 1; min-width: 180px; }
  label { font-size: 12px; color: var(--sub); font-weight: 600; }
  input[type="text"], input[type="date"], input[type="number"], input[type="password"], textarea {
    font-family: inherit; font-size: 14px; padding: 8px 12px;
    border: 1px solid var(--line); border-radius: 8px; background: #fff; color: var(--ink);
  }
  input:focus, textarea:focus { outline: 2px solid var(--accent-soft); border-color: var(--accent); }
  textarea { resize: vertical; min-height: 120px; line-height: 1.7; }
  #c-name { font-size: 16px; font-weight: 700; }

  .q-panel { position: relative; }
  .q-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 8px; }
  .q-num { font-size: 12px; font-weight: 700; color: var(--accent); }
  .q-tools { display: flex; gap: 6px; }
  .count { font-size: 12px; color: var(--sub); text-align: right; margin-top: 4px; }
  .count b { font-size: 14px; color: var(--ink); }
  .count.over b { color: var(--red); }
  .count .ok { color: var(--green); font-weight: 600; }
  .count .ng { color: var(--red); font-weight: 700; }
  .add-q { width: 100%; padding: 12px; border: 2px dashed var(--line); background: transparent; color: var(--sub); border-radius: 12px; font-weight: 600; }
  .add-q:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
  .hidden { display: none; }

  /* ===== modal ===== */
  .overlay {
    position: fixed; inset: 0; background: rgba(43,42,39,.45); z-index: 50;
    display: flex; align-items: center; justify-content: center; padding: 16px;
  }
  .modal {
    background: var(--card); border-radius: 14px; padding: 22px;
    width: 100%; max-width: 640px; max-height: 90vh; overflow-y: auto;
    display: flex; flex-direction: column; gap: 12px;
  }
  .modal h2 { font-size: 16px; }
  .modal .hint { font-size: 12px; color: var(--sub); }
  #paste-text { min-height: 220px; font-size: 13px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; align-items: center; }
  #paste-status { font-size: 12px; color: var(--accent); margin-right: auto; }
  .overlay.hidden { display: none; }
  footer { margin-top: 28px; text-align: center; font-size: 11px; color: var(--sub); }
</style>
</head>
<body>
<div class="wrap">

  <!-- ===== list view ===== -->
  <div id="view-list">
    <div class="top">
      <h1>就活メモリー <span>🌸</span></h1>
      <div class="top-actions">
        <button id="btn-export" class="small" title="バックアップ用JSONを書き出し">書き出し</button>
        <button id="btn-import" class="small" title="JSONバックアップを読み込み">読み込み</button>
        <input type="file" id="file-import" accept=".json" class="hidden">
        <button id="btn-paste">📋 貼り付けて取り込み</button>
        <button id="btn-settings" class="small" title="AI解析の設定">⚙️</button>
        <button id="btn-add" class="primary">＋ 新しい企業</button>
      </div>
    </div>
    <div class="toolbar">
      <input id="search" type="text" placeholder="企業名・設問・回答を検索…">
      <div class="chips" id="status-chips"></div>
      <select id="sort">
        <option value="deadline">締切が近い順</option>
        <option value="updated">更新が新しい順</option>
        <option value="name">企業名順</option>
      </select>
    </div>
    <div class="grid" id="grid"></div>
  </div>

  <!-- ===== detail view ===== -->
  <div id="view-detail" class="hidden">
    <div class="detail-bar">
      <button id="btn-back">← 一覧に戻る</button>
      <span class="saved-note" id="saved-note">✓ 保存しました</span>
      <button id="btn-del" class="danger">この企業を削除</button>
    </div>
    <div class="panel" id="c-panel">
      <div class="frow">
        <div class="field grow"><label>企業名</label><input type="text" id="c-name" placeholder="例：株式会社〇〇"></div>
        <div class="field"><label>提出締切</label><input type="date" id="c-deadline"></div>
        <div class="field"><label>ステータス</label>
          <select id="c-status">
            <option value="draft">下書き</option>
            <option value="done">提出済</option>
            <option value="pass">通過</option>
            <option value="fail">落選</option>
          </select>
        </div>
      </div>
      <div class="frow">
        <div class="field grow"><label>企業ホームページ</label>
          <div class="hp-row">
            <input type="text" id="c-url" placeholder="https://…">
            <button id="btn-open-url" class="small" title="ホームページを開く">🔗 開く</button>
          </div>
        </div>
        <div class="field grow"><label>メモ（職種・マイページURLなど）</label><input type="text" id="c-memo" placeholder="任意"></div>
      </div>
      <div class="frow">
        <div class="field grow"><label>選考状況</label>
          <div class="stage-chips" id="stage-chips"></div>
        </div>
      </div>
    </div>
    <div id="q-list"></div>
    <button class="add-q" id="btn-add-q">＋ 設問を追加</button>
  </div>

  <!-- ===== paste import modal ===== -->
  <div id="paste-overlay" class="overlay hidden">
    <div class="modal">
      <h2>📋 ESを貼り付けて取り込み</h2>
      <p class="hint">応募フォームや確認画面のテキストをそのままコピー＆ペーストすると、<span id="parse-mode-label">自動解析</span>で設問・回答・字数制限ごとに分解して登録します。</p>
      <div class="field"><label>企業名</label><input type="text" id="paste-name" placeholder="例：株式会社〇〇"></div>
      <div class="field"><label>ES全文</label><textarea id="paste-text" placeholder="ここにESの内容を丸ごと貼り付けてください…"></textarea></div>
      <div class="modal-actions">
        <span id="paste-status"></span>
        <button id="paste-cancel">キャンセル</button>
        <button id="paste-run" class="primary">取り込む</button>
      </div>
    </div>
  </div>

  <!-- ===== settings modal ===== -->
  <div id="settings-overlay" class="overlay hidden">
    <div class="modal">
      <h2>⚙️ AI解析の設定</h2>
      <p class="hint">Google Gemini APIキーを登録すると、貼り付け取り込みでAI解析が使えます。キーは<b>このブラウザ内にのみ</b>保存され、外部に送信されるのはGoogleのAPIだけです。キーは <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">Google AI Studio</a> で無料発行できます。</p>
      <div class="field"><label>Gemini APIキー</label><input type="password" id="gem-key" placeholder="AIza… / AQ.… などの形式"></div>
      <div class="field"><label>モデル</label><input type="text" id="gem-model" placeholder="gemini-2.5-flash"></div>
      <div class="modal-actions">
        <button id="settings-cancel">キャンセル</button>
        <button id="settings-save" class="primary">保存</button>
      </div>
    </div>
  </div>

  <footer>データはこのアプリ内に自動保存されます。念のため定期的に「書き出し」でバックアップを取るのがおすすめです。</footer>
</div>

<script>
const KEY = 'es-manager-data-v1';
const STATUS = { draft:['下書き','b-draft'], done:['提出済','b-done'], pass:['通過','b-pass'], fail:['落選','b-fail'] };
const DECO = { pass:'🌸', fail:'🥀', done:'💓', draft:'' };
const STAGES = { es:'ES提出', i1:'一次面接', i2:'二次面接', i3:'最終面接', wait:'合格待ち' };
let data = load();
let currentId = null;
let filterStatus = 'all';
let saveTimer = null;

function load() {
  try { return JSON.parse(localStorage.getItem(KEY)) || { companies: [] }; }
  catch(e) { return { companies: [] }; }
}
function persist(showNote = true) {
  localStorage.setItem(KEY, JSON.stringify(data));
  if (showNote) {
    const n = document.getElementById('saved-note');
    n.classList.add('show');
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => n.classList.remove('show'), 1500);
  }
}
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
const esc = s => (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

/* ===== list ===== */
function dueInfo(d) {
  if (!d) return '';
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.round((new Date(d + 'T00:00:00') - today) / 86400000);
  const ds = d.replace(/-/g, '/').slice(5);
  if (diff < 0)  return `<span>締切 ${ds}（終了）</span>`;
  if (diff === 0) return `<span class="due-warn">締切 本日！</span>`;
  if (diff <= 3) return `<span class="due-warn">締切 ${ds}（あと${diff}日）</span>`;
  if (diff <= 7) return `<span class="due-soon">締切 ${ds}（あと${diff}日）</span>`;
  return `<span>締切 ${ds}</span>`;
}
function renderList() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const sort = document.getElementById('sort').value;
  let list = data.companies.filter(c => {
    if (filterStatus !== 'all' && c.status !== filterStatus) return false;
    if (!q) return true;
    const hay = [c.name, c.memo, c.url || '', STAGES[c.stage] || '', ...c.questions.flatMap(x => [x.q, x.a])].join(' ').toLowerCase();
    return hay.includes(q);
  });
  list.sort((a, b) => {
    if (sort === 'name') return (a.name || '').localeCompare(b.name || '', 'ja');
    if (sort === 'updated') return (b.updatedAt || 0) - (a.updatedAt || 0);
    if (!a.deadline && !b.deadline) return (b.updatedAt||0) - (a.updatedAt||0);
    if (!a.deadline) return 1;
    if (!b.deadline) return -1;
    return a.deadline.localeCompare(b.deadline);
  });
  const grid = document.getElementById('grid');
  if (!list.length) {
    grid.innerHTML = `<div class="empty">${data.companies.length ? '条件に合うESが見つかりません' : 'まだESがありません。<br>「＋ 新しい企業」から最初のESを登録しましょう ✍️'}</div>`;
    return;
  }
  grid.innerHTML = list.map(c => {
    const [label, cls] = STATUS[c.status] || STATUS.draft;
    const preview = c.questions.map(x => x.q).filter(Boolean).join(' ／ ');
    const deco = DECO[c.status] ? `<span class="deco">${DECO[c.status]}</span>` : '';
    const stage = c.stage && STAGES[c.stage] ? `<span class="badge stage-badge">📍 ${STAGES[c.stage]}</span>` : '';
    const link = c.url ? `<a class="card-link" href="${esc(c.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">🔗 HP</a>` : '';
    return `<div class="card s-${c.status}" data-id="${c.id}">
      ${deco}<div class="card-head"><div class="card-name">${esc(c.name) || '（無題）'}</div><span class="badge ${cls}">${label}</span></div>
      <div class="card-meta"><span>設問 ${c.questions.length}件</span>${dueInfo(c.deadline)}${stage}${link}</div>
      ${preview ? `<div class="card-preview">${esc(preview)}</div>` : ''}
    </div>`;
  }).join('');
  grid.querySelectorAll('.card').forEach(el => el.onclick = () => openDetail(el.dataset.id));
}
function renderChips() {
  const wrap = document.getElementById('status-chips');
  const items = [['all', 'すべて'], ...Object.entries(STATUS).map(([k, v]) => [k, v[0]])];
  wrap.innerHTML = items.map(([k, l]) => `<button class="chip ${filterStatus === k ? 'on' : ''}" data-s="${k}">${l}</button>`).join('');
  wrap.querySelectorAll('.chip').forEach(el => el.onclick = () => { filterStatus = el.dataset.s; renderChips(); renderList(); });
}

/* ===== detail ===== */
function getCurrent() { return data.companies.find(c => c.id === currentId); }
function openDetail(id) {
  currentId = id;
  const c = getCurrent(); if (!c) return;
  document.getElementById('view-list').classList.add('hidden');
  document.getElementById('view-detail').classList.remove('hidden');
  document.getElementById('c-name').value = c.name || '';
  document.getElementById('c-deadline').value = c.deadline || '';
  document.getElementById('c-status').value = c.status || 'draft';
  document.getElementById('c-memo').value = c.memo || '';
  document.getElementById('c-url').value = c.url || '';
  applyTheme(c);
  renderStageChips(c);
  renderQuestions();
  window.scrollTo(0, 0);
}
function applyTheme(c) {
  const p = document.getElementById('c-panel');
  p.className = 'panel' + (c.status && c.status !== 'draft' ? ' s-' + c.status : '');
}
function renderStageChips(c) {
  const wrap = document.getElementById('stage-chips');
  wrap.innerHTML = Object.entries(STAGES).map(([k, l]) =>
    `<button class="stage-chip ${k === 'wait' ? 'wait' : ''} ${c.stage === k ? 'on' : ''}" data-stage="${k}">${l}</button>`).join('');
  wrap.querySelectorAll('.stage-chip').forEach(el => el.onclick = () => {
    c.stage = c.stage === el.dataset.stage ? '' : el.dataset.stage;
    touch(c); renderStageChips(c);
  });
}
function backToList() {
  currentId = null;
  document.getElementById('view-detail').classList.add('hidden');
  document.getElementById('view-list').classList.remove('hidden');
  renderList();
}
function touch(c) { c.updatedAt = Date.now(); persist(); }

function countHtml(a, limit) {
  const len = [...(a || '')].length;
  let extra = '';
  if (limit > 0) extra = len <= limit ? ` / ${limit}字 <span class="ok">OK</span>` : ` / ${limit}字 <span class="ng">${len - limit}字オーバー</span>`;
  return `<b>${len}</b>字${extra}`;
}
function renderQuestions() {
  const c = getCurrent();
  const wrap = document.getElementById('q-list');
  wrap.innerHTML = c.questions.map((x, i) => `
    <div class="panel q-panel" data-qid="${x.id}">
      <div class="q-head">
        <span class="q-num">設問 ${i + 1}</span>
        <div class="q-tools">
          <button class="small act-copy">回答をコピー</button>
          <button class="small danger act-delq">削除</button>
        </div>
      </div>
      <div class="frow">
        <div class="field grow"><label>設問</label><input type="text" class="f-q" value="${esc(x.q)}" placeholder="例：学生時代に力を入れたこと"></div>
        <div class="field" style="width:110px"><label>字数制限</label><input type="number" class="f-limit" min="0" value="${x.limit || ''}" placeholder="例：400"></div>
      </div>
      <div class="field"><label>回答</label><textarea class="f-a" placeholder="回答を入力…">${esc(x.a)}</textarea></div>
      <div class="count ${x.limit > 0 && [...(x.a||'')].length > x.limit ? 'over' : ''}">${countHtml(x.a, x.limit)}</div>
    </div>`).join('');

  wrap.querySelectorAll('.q-panel').forEach(panel => {
    const x = c.questions.find(q => q.id === panel.dataset.qid);
    panel.querySelector('.f-q').oninput = e => { x.q = e.target.value; touch(c); };
    panel.querySelector('.f-limit').oninput = e => { x.limit = parseInt(e.target.value) || 0; updateCount(panel, x); touch(c); };
    panel.querySelector('.f-a').oninput = e => { x.a = e.target.value; updateCount(panel, x); touch(c); };
    panel.querySelector('.act-copy').onclick = () => {
      navigator.clipboard.writeText(x.a || '').then(() => {
        const b = panel.querySelector('.act-copy'); b.textContent = '✓ コピー済'; setTimeout(() => b.textContent = '回答をコピー', 1200);
      });
    };
    panel.querySelector('.act-delq').onclick = () => {
      if (!confirm('この設問を削除しますか？')) return;
      c.questions = c.questions.filter(q => q.id !== x.id);
      touch(c); renderQuestions();
    };
  });
}
function updateCount(panel, x) {
  const el = panel.querySelector('.count');
  el.innerHTML = countHtml(x.a, x.limit);
  el.classList.toggle('over', x.limit > 0 && [...(x.a||'')].length > x.limit);
}

/* ===== paste import ===== */
const LIM_RE = /[（(]\s*(\d+)\s*(?:文字|字)\s*以内\s*[)）]/;
function heuristicParse(text) {
  const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
  const isQ = l => LIM_RE.test(l) ||
    /(してください|ご記入ください|お書きください|ご回答ください|回答ください|教えてください)[。．]?\s*([（(].*[)）])?$/.test(l) ||
    /(ですか|ますか)[。．？?]?$/.test(l);
  const isNoise = l =>
    /(チェックしてください|確認画面|ご注意|『?登録(する|画面)|戻る』?ボタン|エントリーします|私は、?上記に該当|参加可能です。?$|^下記設問|^右記|^上記を確認)/.test(l);
  const qs = [];
  let cur = null;
  for (const l of lines) {
    if (isNoise(l)) { continue; }
    if (isQ(l)) {
      if (cur) qs.push(cur);
      const m = l.match(LIM_RE);
      cur = { q: l, limit: m ? parseInt(m[1]) : 0, a: '' };
    } else if (cur) {
      cur.a += (cur.a ? '\n' : '') + l;
    }
  }
  if (cur) qs.push(cur);
  return qs;
}

function buildPrompt(text) {
  return `以下は就活エントリーシート（ES）のコピー＆ペーストです。実質的な設問と回答のペアを抽出してください。
ルール:
- 確認チェック項目・注意書き・操作説明（「登録するボタンをクリック」等）は除外する
- 設問文から字数制限（例:「(300字以内)」）を数値で抽出する。なければ0
- 回答が書かれていない設問は a を空文字にする
- 選択式設問の選択された回答もそのまま a に入れる
- 企業名が文中から分かれば name に入れる。不明なら空文字
- 出力は次のJSONのみ。説明文・コードブロック記法は一切付けない
{"name":"企業名","questions":[{"q":"設問文","limit":300,"a":"回答文"}]}

--- ES本文 ---
${text}`;
}
function parseJsonOut(raw) {
  const m = raw.match(/\{[\s\S]*\}/);
  if (!m) throw new Error('no json');
  const d = JSON.parse(m[0]);
  if (!Array.isArray(d.questions)) throw new Error('bad shape');
  return d;
}
async function claudeParse(text) {
  const res = await window.cowork.askClaude(buildPrompt(text), []);
  const raw = typeof res === 'string' ? res : (res && (res.text || res.content || res.result)) || JSON.stringify(res);
  return parseJsonOut(raw);
}

/* ----- Gemini API（ウェブ版用・キーはこのブラウザにのみ保存） ----- */
const GEM_KEY = 'es-manager-gemini';
function geminiConf() {
  try { return JSON.parse(localStorage.getItem(GEM_KEY)) || {}; } catch { return {}; }
}
async function geminiParse(text) {
  const conf = geminiConf();
  const model = conf.model || 'gemini-2.5-flash';
  const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-goog-api-key': conf.key },
    body: JSON.stringify({ contents: [{ parts: [{ text: buildPrompt(text) }] }] })
  });
  if (!r.ok) throw new Error('gemini http ' + r.status);
  const j = await r.json();
  const raw = j.candidates?.[0]?.content?.parts?.map(p => p.text).join('') || '';
  return parseJsonOut(raw);
}
function aiMode() {
  if (window.cowork && window.cowork.askClaude) return 'claude';
  if (geminiConf().key) return 'gemini';
  return 'none';
}

function openPasteModal() {
  const mode = aiMode();
  document.getElementById('parse-mode-label').textContent =
    mode === 'claude' ? 'AI（Claude）' : mode === 'gemini' ? 'AI（Gemini）' : '自動解析（⚙️設定でGemini APIキーを登録するとAI解析が使えます）';
  document.getElementById('paste-status').textContent = '';
  document.getElementById('paste-overlay').classList.remove('hidden');
  document.getElementById('paste-text').focus();
}
function closePasteModal() { document.getElementById('paste-overlay').classList.add('hidden'); }

document.getElementById('btn-paste').onclick = openPasteModal;
document.getElementById('paste-cancel').onclick = closePasteModal;
document.getElementById('paste-overlay').onclick = e => { if (e.target.id === 'paste-overlay') closePasteModal(); };

document.getElementById('paste-run').onclick = async () => {
  const text = document.getElementById('paste-text').value.trim();
  if (!text) { alert('ESの内容を貼り付けてください。'); return; }
  const btn = document.getElementById('paste-run');
  const status = document.getElementById('paste-status');
  btn.disabled = true;
  status.textContent = aiMode() !== 'none' ? 'AIが解析中…（数秒かかります）' : '解析中…';
  let name = document.getElementById('paste-name').value.trim();
  let questions = [];
  try {
    const mode = aiMode();
    if (mode !== 'none') {
      try {
        const d = mode === 'claude' ? await claudeParse(text) : await geminiParse(text);
        questions = d.questions.map(x => ({ id: uid(), q: x.q || '', limit: parseInt(x.limit) || 0, a: x.a || '' }));
        if (!name && d.name) name = d.name;
      } catch (e) {
        questions = heuristicParse(text).map(x => ({ id: uid(), ...x }));
      }
    } else {
      questions = heuristicParse(text).map(x => ({ id: uid(), ...x }));
    }
    if (!questions.length) {
      questions = [{ id: uid(), q: '', limit: 0, a: text }];
      status.textContent = '設問を自動で分けられなかったため、全文を1つの回答として取り込みました。';
    }
    const c = { id: uid(), name, deadline: '', status: 'draft', stage: 'es', url: '', memo: '', questions, updatedAt: Date.now() };
    data.companies.push(c);
    persist(false);
    closePasteModal();
    document.getElementById('paste-text').value = '';
    document.getElementById('paste-name').value = '';
    openDetail(c.id);
  } finally {
    btn.disabled = false;
    if (document.getElementById('paste-overlay').classList.contains('hidden')) status.textContent = '';
  }
};

  const model = document.getElementById('gem-model').value.trim() || 'gemini-2.5-flash';
  if (key) localStorage.setItem(GEM_KEY, JSON.stringify({ key, model }));
  else localStorage.removeItem(GEM_KEY);
  document.getElementById('settings-overlay').classList.add('hidden');
};

renderList();
